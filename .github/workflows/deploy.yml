name: Build & Deploy Bulletin Widget

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Build Widget
        run: npm run build

      - name: Deploy to Nginx
        run: |
          echo '1458Xiol' | sudo -S mkdir -p /var/www/html/cadreho/bulletinWidget
          echo '1458Xiol' | sudo -S rm -rf /var/www/html/cadreho/bulletinWidget/*
          echo '1458Xiol' | sudo -S cp -r dist/* /var/www/html/cadreho/bulletinWidget/
